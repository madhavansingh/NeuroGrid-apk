name: neurogrid
description: A new Flutter project.
publish_to: none
version: 1.0.0+1

environment:
  sdk: ^3.9.0

dependencies:
  flutter:       # CRITICAL: Required for every Flutter project - DO NOT REMOVE
    sdk: flutter # CRITICAL: Required for every Flutter project - DO NOT REMOVE
  
  # CRITICAL: Core UI and responsive design - DO NOT REMOVE OR MODIFY
  supabase_flutter: ^2.9.1
  sizer: ^3.1.3              # Required for responsive design system
  flutter_svg: ^2.0.9        # Required for SVG icon support
  google_fonts: ^8.1.0       # Required for typography (replaces local fonts)
  shared_preferences: ^2.2.2 # Required for local data storage
  web: ^1.1.1
  
  # Feature dependencies - safe to modify
  cached_network_image: ^3.3.1
  connectivity_plus: ^7.1.1
  dio: ^5.4.0
  fluttertoast: ^9.0.0
  fl_chart: ^1.2.0
  flutter_riverpod: ^2.6.1   # State management for AI chat notifier — keep on v2 (v3 removed StateNotifier)
  flutter_map: ^8.3.0        # Kept for traffic polyline layer widgets
  mapbox_maps_flutter: ^2.22.1 # Premium 3D Mapbox base map
  geolocator: ^14.0.2         # Get user's current location
  url_launcher: ^6.2.5        # Open Google Maps externally for navigation
  image_picker: ^1.1.2        # Pick images from gallery or camera for issue reports
  uuid: ^4.4.0                # Generate unique filenames for image uploads

  latlong2: ^0.9.1
  web_socket_channel: ^3.0.1
  flutter_webrtc: ^1.4.1        # WebRTC peer connection for Retell voice
  permission_handler: ^12.0.1    # Microphone permission requests
  google_sign_in: ^6.2.2        # Real Google OAuth authentication
  geocoding: ^3.0.0             # Reverse-geocode GPS coords to area name
dev_dependencies:
  flutter_test:    # CRITICAL: Required for Flutter project testing - DO NOT REMOVE
    sdk: flutter   # CRITICAL: Required for Flutter project testing - DO NOT REMOVE
  flutter_lints: ^6.0.0 # CRITICAL: Required for code quality - DO NOT REMOVE

flutter:
  uses-material-design: true # CRITICAL: Required for Material icon font - DO NOT REMOVE
  assets:
    - assets/
    - assets/images/
  # CRITICAL ASSET MANAGEMENT RULES:
  # - DO NOT ADD NEW ASSET DIRECTORIES (assets/svg/, assets/icons/, etc.)
  # - ONLY USE EXISTING AND ITEMS AVAILABLE IN THE DIRECTORIES LISTED ABOVE (assets/, assets/images/)
  
  # CRITICAL FONTS RULE: 
  # - THIS PROJECT USES GOOGLE FONTS INSTEAD OF LOCAL FONTS
  # - DO NOT ADD ANY LOCAL FONTS SECTION OR FONT FILES
